services:
  server:
    image: ${API_IMAGE:-ghcr.io/greensec/altcha-docker:latest}
    build:
      context: .
      target: api
    environment:
      SECRET: ${ALTCHA_HMAC_SECRET:-$$ecret.key}
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      EXPIREMINUTES: ${EXPIREMINUTES:-10}
      MAXRECORDS: ${MAXRECORDS:-1000}
      MAXNUMBER: ${MAXNUMBER:-5000}
      PORT: ${PORT:-3000}
      REDIS_URL: ${REDIS_URL:-}
    ports:
      - "3000:3000"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  valkey:
    profiles:
      - redis
    image: valkey/valkey:8-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  demo:
    profiles:
      - demo
    image: ${DEMO_IMAGE:-ghcr.io/greensec/altcha-docker-demo:latest}
    build:
      context: .
      target: demo
    environment:
      NODE_ENV: production
      API_BASE_URL: http://server:3000
    depends_on:
      - server
    ports:
      - "8080:8080"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
